---

- name: import sury apt key
  apt_key:
    url: https://packages.sury.org/php/apt.gpg
    state: present

- name: enable php sury repo
  apt_repository:
    repo: deb https://packages.sury.org/php/ bullseye main
    filename: php-sury

- name: install php packages
  apt:
    pkg:
      - php8.1
      - php8.1-cli
      - php8.1-gd
      - php8.1-mysql
      - php8.1-pdo
      - php8.1-mbstring
      - php8.1-tokenizer
      - php8.1-bcmath
      - php8.1-xml
      - php8.1-fpm
      - php8.1-curl
      - php8.1-zip
      - composer
    state: present
