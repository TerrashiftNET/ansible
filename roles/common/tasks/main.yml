---

- name: Update repositories.
  apt: update_cache=yes cache_valid_time={{ aptcachetime }}

- name: Install common packages.
  apt:
    pkg:
      - sudo
      - curl
      - wget
      - atop
      - net-tools
      - vim
      - git
      - rsync
      - nfs-common
      - unzip
      - whois
      - zip
      - pwgen
      - pv
      - openssl
      - nmap
      - screen
      - tmux
      - unrar-free
      - yamllint
      - pylint
      - shellcheck
      - jq
      - smartmontools
      - python3-virtualenv
    state: latest

- name: Upgrade installed pkgs.
  apt:
    name: "*"
    state: latest

- name: Update hostname to {{ hostname }}
  hostname:
    name: "{{ hostname }}"

- name: set localtime to {{ timezone }}
  copy:
    remote_src: yes
    src: /usr/share/zoneinfo/{{ timezone }}
    dest: /etc/localtime

- name: set timezone to {{ timezone }}
  copy:
    content: "{{ timezone }}\n"
    dest: /etc/timezone

- name: update motd
  copy:
    src: files/common/motd
    dest: /etc/motd

- name: create admin group
  group:
    name: admins
    state: present

- name: allow admin passwordless sudo
  copy:
    dest: /etc/sudoers.d/admins
    content: "%admins ALL=(ALL) NOPASSWD: ALL\n"

- name: Create admin users
  user:
    name: "{{ item }}"
    state: present
    shell: "/bin/bash"
    groups: admins
    append: yes
  with_items:
    - "{{ admins.robo.username }}"
    - "{{ admins.temc_oof.username }}"
    - "{{ admins.dannyws.username }}"

- name: add public SSH keys
  authorized_key:
    user: "{{ item.name }}"
    state: present
    key: "{{ item.key }}"
  with_items:
    - {name: "{{ admins.robo.username }}", key: "{{ admins.robo.key }}"}
    - {name: "{{ admins.temc_oof.username }}", key: "{{ admins.temc_oof.key }}"}
    - {name: "{{ admins.dannyws.username }}", key: "{{ admins.dannyws.key }}"}

- name: add bashrc configurations
  copy:
    dest: /home/{{ item }}/.bashrc
    src: files/common/bashrc
    owner: "{{ item }}"
    group: "{{ item }}"
    force: yes
  with_items:
    - "{{ admins.robo.username }}"
    - "{{ admins.temc_oof.username }}"
    - "{{ admins.dannyws.username }}"

- name: add vimrc configurations
  copy:
    dest: /home/{{ item }}/.vimrc
    src: files/common/vimrc
    owner: "{{ item }}"
    group: "{{ item }}"
    force: yes
  with_items:
    - "{{ admins.robo.username }}"
    - "{{ admins.temc_oof.username }}"
    - "{{ admins.dannyws.username }}"

- name: add root bashrc configurations
  copy:
    dest: /root/.bashrc
    src: files/common/bashrc
    owner: root
    group: root
    force: yes

- name: add root vimrc configurations
  copy:
    dest: /root/.vimrc
    src: files/common/vimrc
    owner: root
    group: root
    force: yes

- name: Install SSH server.
  apt:
    pkg:
      - openssh-server

- name: Disable password auth.
  lineinfile:
    dest: /etc/ssh/sshd_config
    regexp: "^PasswordAuthentication"
    line: "PasswordAuthentication no"
    state: present
  notify: Restart SSH 

- name: Disable root SSH access
  lineinfile:
    dest: /etc/ssh/sshd_config
    regexp: "^PermitRootLogin"
    line: "PermitRootLogin no"
    state: present
  notify: Restart SSH

- name: Ensure SSH is enabled
  service:
    name: ssh
    state: started
    enabled: yes
